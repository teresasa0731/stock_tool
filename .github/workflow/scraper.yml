name: Daily Stock Scraper

on:
  schedule:
    - cron: '30 10 * * *' # 台灣時間 18:30 (UTC 10:30)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas beautifulsoup4 requests urllib3

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/stock_data.csv
          git commit -m "Update stock data" || exit 0
          git push